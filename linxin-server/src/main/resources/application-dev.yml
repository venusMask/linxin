spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lin_xin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: venus@911NASA
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/mysql
    encoding: UTF-8
  mail:
    host: smtp.qq.com
    port: 587
    username: your-email@qq.com
    password: your-email-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

auth:
  secret: ${AUTH_SECRET}
  expire: 1440

ai:
  providers:
    # 阿里云百炼 - 首选旗舰模型
    - name: "Alibaba Qwen Max"
      baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      apiKey: "sk-d6d2cfd858574dd5a21610426030c900"
      model: "qwen-max"
      priority: 10

    # 阿里云百炼 - 次选增强模型 (作为 Max 的备份)
    - name: "Alibaba Qwen Plus"
      baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      apiKey: "sk-d6d2cfd858574dd5a21610426030c900"
      model: "qwen-plus"
      priority: 9

    # 阿里云百炼 - 基础快速模型 (成本最低，最后保底)
    - name: "Alibaba Qwen Turbo"
      baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      apiKey: "sk-d6d2cfd858574dd5a21610426030c900"
      model: "qwen-turbo"
      priority: 8

    # 火山引擎 - 跨厂商备份
    - name: "Volcengine Doubao"
      baseUrl: "https://ark.cn-beijing.volces.com/api/v3"
      apiKey: "YOUR_VOLCENGINE_API_KEY"
      model: "YOUR_ENDPOINT_ID"
      priority: 5
  temperature: 0.7

websocket:
  allowed-origins: "http://localhost:*,http://127.0.0.1:*"
