spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/lin_xin?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${USERNAME}
    password: ${PASSWORD}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

auth:
  secret: ${AUTH_SECRET}
  expire: 60
