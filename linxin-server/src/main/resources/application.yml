spring:
  application:
    name: lin-xin-mgr-backend
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 9099
  servlet:
    context-path: /lxa

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.venus.lin.xin.mgr: debug

ai:
  base-url: https://api.openai.com
  api-key: ${AI_API_KEY:your-api-key}
  model: gpt-3.5-turbo
  temperature: 0.7
